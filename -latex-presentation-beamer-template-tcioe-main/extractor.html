<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PDF Text Extractor</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f1f5f9; color: #1e293b; }
        h1 { font-size: 20px; }
        #status { font-weight: bold; font-size: 16px; margin-bottom: 20px; padding: 10px; border-radius: 4px; background: #e2e8f0; inline-size: fit-content; }
        .section { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        textarea { width: 100%; height: 350px; font-family: monospace; font-size: 12px; border: 1px solid #cbd5e1; border-radius: 4px; padding: 10px; box-sizing: border-box; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
    <h1>PDF Text Extractor</h1>
    <div id="status">Extracting...</div>
    
    <div class="section">
        <label for="proposal-output">Proposal PDF Text:</label>
        <textarea id="proposal-output" placeholder="Text from proposal.pdf will appear here..."></textarea>
    </div>

    <div class="section">
        <label for="content-output">Content PDF Text:</label>
        <textarea id="content-output" placeholder="Text from content.pdf.pdf will appear here..."></textarea>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        async function extractText(url, outputId) {
            try {
                console.log("Loading PDF: " + url);
                const pdf = await pdfjsLib.getDocument(url).promise;
                console.log("PDF loaded successfully: " + url + ", pages: " + pdf.numPages);
                let fullText = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(" ");
                    fullText += `\n--- Page ${i} ---\n` + pageText + "\n";
                }
                document.getElementById(outputId).value = fullText;
                return true;
            } catch (e) {
                console.error("Error extracting " + url + ": ", e);
                document.getElementById(outputId).value = "Error extracting " + url + ": " + e.toString();
                return false;
            }
        }

        async function start() {
            const r1 = await extractText('/proposal.pdf', 'proposal-output');
            const r2 = await extractText('/content.pdf.pdf', 'content-output');
            const statusDiv = document.getElementById('status');
            if (r1 && r2) {
                statusDiv.innerText = 'Done';
                statusDiv.style.background = '#dcfce7';
                statusDiv.style.color = '#15803d';
            } else {
                statusDiv.innerText = 'Error (see textareas for details)';
                statusDiv.style.background = '#fee2e2';
                statusDiv.style.color = '#b91c1c';
            }
        }
        
        // Wait a short bit to let page render
        setTimeout(start, 500);
    </script>
</body>
</html>
